<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      width: 320px;
      background: #1a1a2e;
      color: #e0e0e0;
    }

    .header {
      padding: 16px;
      background: linear-gradient(135deg, #16213e, #0f3460);
      border-bottom: 1px solid #533483;
    }

    .header h1 {
      font-size: 14px;
      font-weight: 600;
      color: #e94560;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 11px;
      color: #a0a0b0;
    }

    .shortcuts {
      padding: 12px 16px;
      background: #16213e;
      border-bottom: 1px solid #1a1a3e;
    }

    .shortcut-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
    }

    .shortcut-label {
      font-size: 12px;
      color: #c0c0d0;
    }

    .shortcut-keys {
      display: flex;
      gap: 4px;
    }

    kbd {
      background: #0f3460;
      border: 1px solid #533483;
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 11px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      color: #e94560;
      font-weight: 600;
    }

    .divider {
      height: 1px;
      background: #1a1a3e;
      margin: 4px 0;
    }

    .tab-list {
      max-height: 280px;
      overflow-y: auto;
    }

    .tab-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid #1a1a3e;
      cursor: pointer;
      transition: background 0.15s;
    }

    .tab-item:hover {
      background: #16213e;
    }

    .tab-item.current {
      background: #0f3460;
      border-left: 3px solid #e94560;
      padding-left: 13px;
    }

    .tab-position {
      font-size: 10px;
      color: #533483;
      font-weight: 700;
      min-width: 16px;
      text-align: center;
    }

    .tab-item.current .tab-position {
      color: #e94560;
    }

    .tab-favicon {
      width: 16px;
      height: 16px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .tab-favicon-placeholder {
      width: 16px;
      height: 16px;
      background: #533483;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .tab-info {
      overflow: hidden;
      flex: 1;
    }

    .tab-title {
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #e0e0e0;
    }

    .tab-url {
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #606080;
      margin-top: 2px;
    }

    .footer {
      padding: 10px 16px;
      text-align: center;
      font-size: 10px;
      color: #606080;
      background: #1a1a2e;
      border-top: 1px solid #1a1a3e;
    }

    .footer a {
      color: #e94560;
      text-decoration: none;
    }

    .empty-state {
      padding: 24px 16px;
      text-align: center;
      color: #606080;
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>Firefox-Style Tab Switching</h1>
    <p>Switch between recent tabs like Firefox</p>
  </div>

  <div class="shortcuts">
    <div class="shortcut-row">
      <span class="shortcut-label">Previous tab</span>
      <div class="shortcut-keys">
        <kbd>Alt</kbd> <kbd>Q</kbd>
      </div>
    </div>
    <div class="divider"></div>
    <div class="shortcut-row">
      <span class="shortcut-label">Next in history</span>
      <div class="shortcut-keys">
        <kbd>Alt</kbd> <kbd>W</kbd>
      </div>
    </div>
    <div class="divider"></div>
    <div class="shortcut-row">
      <span class="shortcut-label">Customize shortcuts</span>
      <div class="shortcut-keys">
        <a href="#" id="openShortcuts" style="color: #e94560; font-size: 11px; text-decoration: none;">chrome://extensions/shortcuts</a>
      </div>
    </div>
  </div>

  <div class="tab-list" id="tabList">
    <div class="empty-state">Loading tab history...</div>
  </div>

  <div class="footer">
    MRU Tab History (most recent first)
  </div>

  <script src="popup.js"></script>
</body>
</html>
